name: Scrape 13F Filings

on:
  schedule:
    # Every 6 hours year-round — filing season windows are Feb/May/Aug/Nov.
    # GitHub Actions may skip runs if the repo is inactive; workflow_dispatch
    # lets you trigger manually any time.
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # 1. Scrape SEC EDGAR and commit any new data
  # --------------------------------------------------------------------------
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the data commit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git push works cleanly

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests lxml

      - name: Run scraper (incremental — skips quarters already on disk)
        run: python scraper/main.py
        env:
          SEC_USER_AGENT: "SuperinvestorTracker/1.0 ${{ secrets.CONTACT_EMAIL }}"

      - name: Commit updated data if anything changed
        run: |
          git config user.name  "13F Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || \
            git commit -m "Update holdings $(date -u +%Y-%m-%d_%H:%M)"
          git push

  # --------------------------------------------------------------------------
  # 2. Build React frontend and deploy to GitHub Pages
  # --------------------------------------------------------------------------
  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed by peaceiris/actions-gh-pages

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pick up any commit made by the scrape job above

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Copy data JSON into build output
        run: |
          mkdir -p frontend/dist/data
          cp data/frontend/*.json frontend/dist/data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
