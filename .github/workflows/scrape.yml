name: Scrape 13F Filings

on:
  schedule:
    # Once daily at 04:00 UTC. Conservative cadence -- 13F filings are
    # quarterly, so once-a-day still catches anything within ~16h of filing.
    # Manual trigger remains available via workflow_dispatch.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # 1. Scrape SEC EDGAR and commit any new data
  # --------------------------------------------------------------------------
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the data commit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git push works cleanly

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests lxml

      - name: Verify CONTACT_EMAIL secret is set
        # Fail loudly if the secret is empty, before any SEC requests go out.
        # Avoids the bare "SuperinvestorTracker/1.0 " UA that gets throttled.
        run: |
          if [ -z "${{ secrets.CONTACT_EMAIL }}" ]; then
            echo "::error::CONTACT_EMAIL secret is not set. Aborting before SEC requests."
            exit 1
          fi
          echo "CONTACT_EMAIL secret present (length OK)."

      - name: Run scraper (incremental — skips quarters already on disk)
        run: python scraper/main.py
        env:
          SEC_USER_AGENT: "SuperinvestorTracker/1.0 ${{ secrets.CONTACT_EMAIL }}"
          # Slower delay on shared CI runners. Local dev stays at 0.15s default.
          SEC_DELAY: "0.5"

      - name: Commit updated data if anything changed
        run: |
          git config user.name  "13F Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || \
            git commit -m "Update holdings $(date -u +%Y-%m-%d_%H:%M)"
          git push

  # --------------------------------------------------------------------------
  # 2. Build React frontend and deploy to GitHub Pages
  # --------------------------------------------------------------------------
  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed by peaceiris/actions-gh-pages

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pick up any commit made by the scrape job above

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests lxml

      - name: Regenerate dashboard JSONs from raw holdings
        # data/frontend/*.json is gitignored (derivative data). Rebuild it
        # from the committed data/holdings/ tree before bundling the frontend.
        run: python scraper/main.py --export-only

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Copy data JSON into build output
        run: |
          mkdir -p frontend/dist/data
          cp data/frontend/*.json frontend/dist/data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
